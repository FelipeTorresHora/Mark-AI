<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts agendados para hoje</title>
  <style>
    body {{
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f5;
      margin: 0;
      padding: 24px 0;
      color: #18181b;
    }}
    .container {{
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }}
    .header {{
      background: #18181b;
      padding: 28px 32px;
    }}
    .header h1 {{
      margin: 0;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
    }}
    .header p {{
      margin: 4px 0 0;
      color: #a1a1aa;
      font-size: 14px;
    }}
    .body {{
      padding: 28px 32px;
    }}
    .body p {{
      margin: 0 0 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #3f3f46;
    }}
    table {{
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }}
    th {{
      text-align: left;
      padding: 8px 12px;
      background: #f4f4f5;
      color: #71717a;
      font-weight: 600;
      border-bottom: 1px solid #e4e4e7;
    }}
    td {{
      padding: 10px 12px;
      border-bottom: 1px solid #f4f4f5;
      vertical-align: top;
    }}
    .badge {{
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
    }}
    .badge-x        {{ background: #dbeafe; color: #1d4ed8; }}
    .badge-linkedin {{ background: #dcfce7; color: #15803d; }}
    .footer {{
      padding: 20px 32px;
      background: #fafafa;
      border-top: 1px solid #f4f4f5;
      font-size: 12px;
      color: #a1a1aa;
      text-align: center;
    }}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Bom dia!</h1>
      <p>Posts agendados para {date}</p>
    </div>
    <div class="body">
      <p>Oi, <strong>{user_email}</strong>! Aqui estão os posts que estão agendados para publicação hoje:</p>
      <table>
        <thead>
          <tr>
            <th>Plataforma</th>
            <th>Horário</th>
            <th>Status</th>
            <th>Conteúdo</th>
          </tr>
        </thead>
        <tbody>
          {posts_rows}
        </tbody>
      </table>
    </div>
    <div class="footer">
      Você está recebendo este e-mail porque possui posts agendados na plataforma.<br />
      Agência de Marketing IA
    </div>
  </div>
</body>
</html>
