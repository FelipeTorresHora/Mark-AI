services:
  - type: web
    name: mark-ai-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mark-ai-postgres
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: mark-ai-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        fromService:
          name: mark-ai-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SOCIAL_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: DEFAULT_USER_TIMEZONE
        value: America/Sao_Paulo
      - key: MORNING_ALERT_HOUR
        value: "8"

  - type: web
    name: mark-ai-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mark-ai-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mark-ai-postgres
    databaseName: mark_ai
    user: mark_ai
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
